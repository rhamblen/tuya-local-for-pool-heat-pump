# ============================================================================
# Pool Heat Pump Tile  —  Home Assistant Lovelace dashboard card
# ----------------------------------------------------------------------------
# Uses ONLY core HA cards (vertical-stack / grid / tile / heading) so no extra
# HACS frontend resources are required. Compatible with Home Assistant 2026+.
#
# ENTITY IDS BELOW ARE FROM A REAL LOCALTUYA INSTALL (see docs/datapoints.md,
# "Reference: a real deployment"). If your LocalTuya entities are named
# differently, find/replace to match — every id here exists and reports live.
#
# NOTE: this deployment also has a Shelly power meter on the heat-pump circuit
# (sensor.pool_power_power / sensor.pool_power_energy), so the optional COP
# block at the bottom uses MEASURED watts instead of a current×voltage proxy.
#
# DPs 134 (compressor relay), 118 (actual operating mode) and 103 (°C/°F) are
# not currently mapped in this LocalTuya config, so they are omitted here.
# Add them in LocalTuya to light up the commented tiles. DP 118 is recommended.
# ============================================================================

type: vertical-stack
cards:
  # ----- Title + headline control -----------------------------------------
  - type: heading
    heading: Pool Heat Pump
    heading_style: title
    icon: mdi:hot-tub

  - type: grid
    columns: 2
    square: false
    cards:
      - type: tile
        entity: switch.pool_power_switch
        name: Power
        icon: mdi:power
        color: green
        tap_action:
          action: toggle
      - type: tile
        entity: select.pool_set_mode
        name: Mode
        icon: mdi:tune-variant
        # tap opens the more-info dialog to pick smart / warm / cool

  # ===== THERMAL ===========================================================
  - type: heading
    heading: Thermal
    heading_style: subtitle
    icon: mdi:thermometer-water

  - type: grid
    columns: 2
    square: false
    cards:
      - type: tile
        entity: sensor.pool_current_temperature
        name: Water In
        icon: mdi:pool-thermometer
        color: blue
      - type: tile
        entity: number.pool_target_temperature
        name: Set Temp
        icon: mdi:thermometer-chevron-up
        features_position: bottom
        features:
          - type: numeric-input
            style: buttons
      - type: tile
        entity: sensor.pool_ambient_temperature
        name: Air (unit)
        icon: mdi:weather-windy
      - type: tile
        entity: sensor.pool_heatpump_coil_pipe_temp
        name: Coil
        icon: mdi:snowflake-thermometer
      - type: tile
        entity: sensor.pool_exhaust_temperature
        name: Discharge
        icon: mdi:thermometer-high
        color: red
      - type: tile
        entity: sensor.pool_radiator_temperature
        name: Heat Sink
        icon: mdi:radiator

  # ===== PERFORMANCE (inverter) ===========================================
  - type: heading
    heading: Performance
    heading_style: subtitle
    icon: mdi:speedometer

  - type: grid
    columns: 2
    square: false
    cards:
      - type: tile
        entity: sensor.pool_heatpump_compressor_frequency
        name: Compressor
        icon: mdi:sine-wave
        color: amber
      - type: tile
        entity: sensor.pool_heatpump_compressor_current
        name: Current
        icon: mdi:current-ac
      - type: tile
        entity: sensor.pool_compressor_speed
        name: Speed
        icon: mdi:gauge
      - type: tile
        entity: sensor.pool_heatpump_dc_fan_speed
        name: DC Fan
        icon: mdi:fan
      - type: tile
        entity: select.pool_heatpump_ac_fan_speed
        name: AC Fan
        icon: mdi:fan-speed-3
      - type: tile
        entity: sensor.pool_heatpump_exv_position
        name: EXV Pos
        icon: mdi:valve
      # --- measured electrical input (Shelly PM on the heat-pump circuit) ---
      - type: tile
        entity: sensor.pool_power_power
        name: Power Draw
        icon: mdi:flash
        color: orange
      - type: tile
        entity: sensor.pool_power_energy
        name: Energy
        icon: mdi:counter

  # Trend graph: compressor frequency + water temp + measured power
  - type: history-graph
    title: Compressor frequency & power (24h)
    hours_to_show: 24
    entities:
      - entity: sensor.pool_heatpump_compressor_frequency
        name: Frequency (Hz)
      - entity: sensor.pool_current_temperature
        name: Water In (°C)
      - entity: sensor.pool_power_power
        name: Power (W)

  # ===== SYSTEM STATUS =====================================================
  - type: heading
    heading: System Status
    heading_style: subtitle
    icon: mdi:state-machine

  - type: grid
    columns: 2
    square: false
    cards:
      - type: tile
        entity: binary_sensor.pool_heatpump_defrost
        name: Defrost
        icon: mdi:snowflake-melt
        color: cyan
      - type: tile
        entity: binary_sensor.pool_heatpump_water_pump
        name: Pump
        icon: mdi:pump
        color: blue
      - type: tile
        entity: binary_sensor.pool_heatpump_4_way_valve
        name: 4-Way Valve
        icon: mdi:valve-open
      - type: tile
        entity: binary_sensor.pool_heatpump_charge_relay
        name: Charge Relay
        icon: mdi:flash
      - type: tile
        entity: switch.pool_silent_mode
        name: Silent
        icon: mdi:volume-mute
        tap_action:
          action: toggle
      - type: tile
        entity: sensor.pool_error_code1
        name: Faults
        icon: mdi:alert-circle
        color: red
      # --- not mapped in LocalTuya yet (add DP 134 / DP 118 to enable) ------
      # - type: tile
      #   entity: sensor.pool_actual_mode        # DP 118 (0=Heating, 1=Cooling)
      #   name: Actual Mode
      #   icon: mdi:swap-horizontal-bold
      # - type: tile
      #   entity: binary_sensor.pool_compressor_relay   # DP 134
      #   name: Comp. Relay
      #   icon: mdi:electric-switch

