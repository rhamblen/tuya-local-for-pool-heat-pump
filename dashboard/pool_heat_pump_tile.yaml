#           {% set m = states('sensor.pool_heat_pump_actual_mode') %}
#           {{ 'Heating' if m == '0' else 'Cooling' if m == '1' else 'Unknown' }}
#
#       # --- Heat-output proxy (Q ~ m_dot * c * dT) ------------------------
#       # ASSUMED flow rate; dT approximated from inlet vs unit-air. This is a
#       # TREND indicator, not a calibrated kW reading.
#       - name: Pool Heat Pump Heat Output Estimate
#         unit_of_measurement: kW
#         state: >
#           {% set flow_lpm = 80 %}            {# assumed pump flow, L/min #}
