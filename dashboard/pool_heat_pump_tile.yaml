#           {% set dT = (inlet - air) | abs %}
#           {# Q(kW) = flow(kg/s) * 4.186 kJ/kgK * dT #}
#           {{ ((flow_lpm / 60.0) * 4.186 * dT) | round(2) }}
#
#       # --- COP proxy ------------------------------------------------------
#       # Relative-only: useful heat (above) vs an electrical-input model from
